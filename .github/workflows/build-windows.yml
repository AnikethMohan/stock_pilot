name: Build Windows Desktop

on:
  push:
    branches:
      - '**' # Triggers on push to any branch
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build & Release Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows App
        run: flutter build windows --release

      - name: Create MSIX Installer
        run: flutter pub run msix:create --display-name "Stock Pilot" --publisher-display-name "Your Name" --publisher "CN=YourName" --install-certificate false --output-path build\windows\x64\runner\Release\ --output-name "stock-pilot-installer"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build\windows\x64\runner\Release\stock-pilot-installer.msix

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build\windows\x64\runner\Release\stock-pilot-installer.msix
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
