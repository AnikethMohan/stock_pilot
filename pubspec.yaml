name: stock_pilot
description: "Universal Inventory Management System — offline-first, cross-platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0
  equatable: ^2.0.7

  # Database
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+5
  path_provider: ^2.1.5
  path: ^1.9.1

  # CSV / PDF
  csv: ^6.0.0
  file_picker: ^10.3.10
  pdf: ^3.11.2
  printing: ^5.13.4

  # Scanning


  # Utilities
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  msix: ^3.16.7

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf